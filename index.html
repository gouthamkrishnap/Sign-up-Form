<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign-up Form</title>
</head>
<body>
    <div class="container">
        <div class="background-img">
            <img src="assets/images/kristijan-arsov-tcw3nwoAgvs-unsplash.jpg" alt="Old Viking statue of the god Odin, the Allfather">
        </div>
        <div class="main-container">
            <div class="form-hero">
                <blockquote>
                    <p>"A man's own mind is the best burden he carries."</p>
                    <footer> - Odin, <cite>Hávamál</cite></footer>
                </blockquote>
            </div>
            <div class="form-container">
                <div class="form-main">
                    <h3>
                        Knowledge opens every gate—begin by telling your story.
                    </h3>
                    <form id="form">
                        <div class="form-row">
                            <div class="form-input">
                                <label for="first-name">FIRST NAME</label>
                                <input type="text" id="first-name" placeholder="Thor" required>
                            </div>
                            <div class="form-input">
                                <label for="last-name">LAST NAME</label>
                                <input type="text" id="last-name" placeholder="Odinson" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-input">
                                <label for="email">EMAIL</label>
                                <input type="email" id="email" placeholder="strongestavenger@asgard.com" required>
                            </div>
                            <div class="form-input">
                                <label for="phone-number">PHONE NUMBER</label>
                                <input type="tel" id="phone-number" placeholder="+47 xxxxxxxx" required>
                            </div>
                        </div>
    
                        <div class="form-row">
                            <div class="form-input">
                                <label for="password">PASSWORD</label>
                                <input type="password" id="password" required>
                            </div>
                            <div class="form-input">
                                <label for="confirm-password">CONFIRM PASSWORD</label>
                                <input type="password" id="confirm-password" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="form-btn">
                    <button form="form">Create Account</button>
                </div>
            </div>
            <div class="form-login">
                <p>Already have an account? <a href="#"> Log in</a></p>
            </div>
        </div>
    </div>
</body>
</html>
